<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Запись на молитву</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:95%;
    max-width:500px;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#22c55e;
    color:#fff;
    font-size:16px;
    margin-top:10px;
}

button:hover{
    opacity:.9;
}

.time-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.time-btn{
    background:#334155;
}

input,textarea{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border-radius:10px;
    border:1px solid #475569;
    background:#0f172a;
    color:white;
    margin-top:10px;
}

textarea{
    height:120px;
}

.step{
    display:none;
}

.active{
    display:block;
}

.success{
    text-align:center;
    font-size:22px;
    color:#4ade80;
}
</style>
</head>

<body>

<div class="card">

<div id="start" class="step active">
<h1>Время действовать</h1>
<div class="subtitle">
Запись на молитву
</div>

<button onclick="showTimes()">
Записаться
</button>
</div>

<div id="times" class="step">
<h2>Выберите время</h2>
<div class="time-grid" id="timeGrid"></div>
</div>

<div id="nameStep" class="step">
<h2>Введите фамилию и имя</h2>
<input id="name" placeholder="Фамилия Имя">
<button onclick="nextPhone()">Далее</button>
</div>

<div id="phoneStep" class="step">
<h2>Введите номер телефона</h2>
<input id="phone" placeholder="+7 999 999 99 99">
<button onclick="nextProblem()">Далее</button>
</div>

<div id="problemStep" class="step">
<h2>О чём хотите помолиться?</h2>
<textarea id="problem"></textarea>

<button onclick="sendApplication()">
Записаться
</button>
</div>

<div id="successStep" class="step">
<div class="success">
Ваша заявка отправлена ✅
</div>
</div>

</div>

<script>

let formData={
time:"",
name:"",
phone:"",
problem:""
};

function show(id){
document.querySelectorAll(".step").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function showTimes(){
show("times");
}

const grid=document.getElementById("timeGrid");

for(let h=18;h<=21;h++){

for(let m of [0,15,30,45]){

if(h===21 && m>0) continue;

const time=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0");

const btn=document.createElement("button");

btn.className="time-btn";
btn.innerText=time;

btn.onclick=()=>{
formData.time=time;
show("nameStep");
};

grid.appendChild(btn);

}
}

function nextPhone(){

formData.name=
document.getElementById("name").value;

show("phoneStep");
}

function nextProblem(){

formData.phone=
document.getElementById("phone").value;

show("problemStep");
}

async function sendApplication(){

formData.problem=
document.getElementById("problem").value;

await fetch("/api/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(formData)
});

show("successStep");

}
</script>

</body>
</html>
